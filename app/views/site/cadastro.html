<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexStroll</title>
    <link rel="stylesheet" href="/public/css/cadastro.css">
    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main class="main-cadastro">
        <div class="container-cadastro">

            <div class="box1-cadastro">
                <div class="topo-cadastro">
                    <i id="icone-voltar-cadastro" class="fa-regular fa-circle-left"></i>
                    <h1 class="titulo-cadastro">Cadastro</h1>
                </div>

                <h2 class="subtitulo-cadastro">Registre-se aqui.</h2>

                <div class="campos-cadastro">
                    <p class="descricao-cadastro">Nome</p>
                    <label class="label-cadastro">
                        <div class="elementos-input">
                            <i id="icone-user-cadastro" class="fa-regular fa-user"></i>
                            <span class="line-cadastro"></span>
                        </div>
                        <input id="nome" name="nome" type="nome" class="input-cadastro">
                    </label>

                    <p class="descricao-cadastro">Email</p>
                    <label class="label-cadastro">
                        <div class="elementos-input">
                            <i id="icone-envelope" class="fa-regular fa-envelope"></i>
                            <span class="line-cadastro"></span>
                        </div>
                        <input id="email" name="email" type="email" class="input-cadastro">
                    </label>

                    <p class="descricao-cadastro">Senha</p>
                    <label class="label-cadastro">
                        <div class="elementos-input">
                            <i id="icone-senha" class="fa-solid fa-lock"></i>
                            <span class="line-cadastro"></span>
                        </div>
                        <input id="senha" name="senha" type="senha" class="input-cadastro">
                    </label>

                    <p class="descricao-cadastro">Confirme a senha</p>
                    <label class="label-cadastro">
                        <div class="elementos-input">
                            <i id="icone-senha" class="fa-solid fa-lock"></i>
                            <span class="line-cadastro"></span>
                        </div>
                        <input id="confirmaSenha" name="confirmaSenha" type="confirmaSenha" class="input-cadastro">
                    </label>
                </div>

                <button class="botao-cadastro">Cadastrar</button>
            </div>

            <div class="box2-cadastro">
                <img class="img-cadastro" src="/public/assets/logo.png" alt="">
            </div>
        </div>
    </main>
</body>

</html>
